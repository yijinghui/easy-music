spring:

  # 配置数据源
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/vibe_music?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true # 修改你的 MySQL 地址和库名
    username: root # 修改你的 MySQL 用户名
    password: 123456 # 修改你的 MySQL 密码
    type: com.alibaba.druid.pool.DruidDataSource # 配置连接池

  # Redis服务连接配置
  data:
    redis:
      database: 1
      host: 127.0.0.1
      port: 6379
      password:

  servlet:
    multipart:
      max-file-size: 100MB # 设置最大上传文件大小为100MB
      max-request-size: 100MB # 设置最大请求大小为100MB

  # 对于注解@Cachable的Redis缓存数据统一设置有效期为10分钟，单位毫秒
  cache:
    redis:
      time-to-live: 600000

  rabbitmq:
    host: 192.168.150.101
    port: 5672
    virtual-host: /easy
    username: easy
    password: 123456


  # 配置邮件服务
  mail:
    # 配置邮箱账户和密码
    host: smtp.qq.com # 修改你的 SMTP 服务器地址
    port: 465
    username: 480395924@qq.com # 修改你的邮箱账号
    password: odvpyxhhztswbjec # 修改你的邮箱应用密码或授权码
    default-encoding: UTF-8
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
          # 邮件服务超时时间配置
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000




# 配置 mybatis-plus
mybatis-plus:
  type-aliases-package: com.easy.pojo # 实体类所在的包，允许用实体类类名作为别名

  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 配置日志
    map-underscore-to-camel-case: true # 类属性与表字段的驼峰映射

  global-config:
    db-config: # 数据库配置
      table-prefix: tb_  # 表名前缀为tb_，表名为前缀连接类名（小写）



# 定义角色和路径权限的映射关系
role-path-permissions:
  permissions:
    ROLE_ADMIN:
      - "/admin/"
    ROLE_USER:
      - "/user/"
    ROLE_ARTIST:
      - "/artist/"
      - "/user/"


minio:
  endpoint: http://localhost:9000 # 修改你的 MinIO 端点
  accessKey: minioadmin # 修改你的 MinIO Access Key
  secretKey: minioadmin # 修改你的 MinIO Secret Key
  bucket: vibe-music-data # 确认 Bucket 名称与你创建的一致


